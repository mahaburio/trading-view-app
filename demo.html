<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradingView - Lightweight Charts</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        background: #131722;
        color: #d1d5db;
      }

      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background: #1e2229;
        border-bottom: 1px solid #2d3139;
        gap: 20px;
      }

      .toolbar-left {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .toolbar-right {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .symbol-section {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .symbol-name {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 4px;
        transition: background 0.2s;
      }

      .symbol-name:hover {
        background: #2d3139;
      }

      .price-info {
        display: flex;
        gap: 20px;
      }

      .price-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .price-label {
        font-size: 11px;
        color: #a6acaf;
        text-transform: uppercase;
      }

      .price-value {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
      }

      .price-change {
        font-size: 14px;
        font-weight: 500;
      }

      .price-change.up {
        color: #26a69a;
      }

      .price-change.down {
        color: #f6465d;
      }

      /* Timeframe Selector */
      .timeframe-group {
        display: flex;
        gap: 6px;
        background: #2d3139;
        padding: 6px;
        border-radius: 6px;
      }

      .timeframe-btn {
        padding: 6px 14px;
        background: transparent;
        border: none;
        color: #a6acaf;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        border-radius: 4px;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .timeframe-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #d1d5db;
      }

      .timeframe-btn.active {
        background: #3861fb;
        color: #fff;
      }

      /* Chart Container */
      .chart-section {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #chart {
        width: 100%;
        height: 100%;
      }

      /* Statistics Panel */
      .stats-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(30, 34, 41, 0.9);
        border: 1px solid #2d3139;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        z-index: 10;
        backdrop-filter: blur(10px);
      }

      .stats-row {
        display: flex;
        gap: 12px;
        margin: 6px 0;
        white-space: nowrap;
      }

      .stats-label {
        color: #a6acaf;
        min-width: 40px;
      }

      .stats-value {
        color: #fff;
        font-weight: 600;
      }

      /* Legend */
      .legend {
        position: absolute;
        bottom: 60px;
        left: 20px;
        background: rgba(30, 34, 41, 0.9);
        border: 1px solid #2d3139;
        border-radius: 8px;
        padding: 12px;
        font-size: 12px;
        z-index: 10;
        backdrop-filter: blur(10px);
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }

      .legend-indicator {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        background: #26a69a;
      }

      /* Footer */
      .footer {
        padding: 8px 20px;
        background: #1e2229;
        border-top: 1px solid #2d3139;
        font-size: 11px;
        color: #a6acaf;
        display: flex;
        justify-content: space-between;
      }

      /* Modals */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: #1e2229;
        border: 1px solid #2d3139;
        border-radius: 8px;
        padding: 24px;
        max-width: 400px;
        width: 90%;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #fff;
      }

      .input-group {
        margin-bottom: 16px;
      }

      .input-label {
        display: block;
        font-size: 12px;
        color: #a6acaf;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .input-field {
        width: 100%;
        padding: 8px 12px;
        background: #2d3139;
        border: 1px solid #3d424d;
        border-radius: 4px;
        color: #fff;
        font-size: 14px;
      }

      .input-field:focus {
        outline: none;
        border-color: #3861fb;
        box-shadow: 0 0 0 2px rgba(56, 97, 251, 0.2);
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #3861fb;
        color: #fff;
      }

      .btn-primary:hover {
        background: #2851d9;
      }

      .btn-secondary {
        background: #2d3139;
        color: #d1d5db;
      }

      .btn-secondary:hover {
        background: #3d424d;
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .toolbar {
          flex-wrap: wrap;
        }

        .price-info {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="symbol-section">
            <div class="symbol-name" id="symbolName">AAPL</div>
            <div class="price-info">
              <div class="price-item">
                <span class="price-label">Last Price</span>
                <span class="price-value" id="lastPrice">$0.00</span>
              </div>
              <div class="price-item">
                <span class="price-label">Change</span>
                <span class="price-value price-change up" id="priceChange"
                  >+0.00%</span
                >
              </div>
            </div>
          </div>
        </div>

        <div class="toolbar-right">
          <div class="timeframe-group">
            <button class="timeframe-btn" data-timeframe="1">1m</button>
            <button class="timeframe-btn" data-timeframe="5">5m</button>
            <button class="timeframe-btn" data-timeframe="15">15m</button>
            <button class="timeframe-btn active" data-timeframe="60">1h</button>
            <button class="timeframe-btn" data-timeframe="240">4h</button>
            <button class="timeframe-btn" data-timeframe="1440">1d</button>
            <button class="timeframe-btn" data-timeframe="10080">W</button>
            <button class="timeframe-btn" data-timeframe="43200">M</button>
          </div>
        </div>
      </div>

      <!-- Chart Section -->
      <div class="chart-section">
        <div id="chart"></div>

        <!-- Stats Panel -->
        <div class="stats-panel" id="statsPanel">
          <div class="stats-row">
            <span class="stats-label">High:</span>
            <span class="stats-value" id="statsHigh">$0.00</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">Low:</span>
            <span class="stats-value" id="statsLow">$0.00</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">Open:</span>
            <span class="stats-value" id="statsOpen">$0.00</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">Close:</span>
            <span class="stats-value" id="statsClose">$0.00</span>
          </div>
        </div>

        <!-- Legend -->
        <div class="legend">
          <div class="legend-item">
            <div class="legend-indicator"></div>
            <span>Candlestick Chart</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span id="footerLeft">Ready</span>
        <span id="footerRight">Lightweight Charts v4.1.0</span>
      </div>
    </div>

    <!-- Modal for Symbol Change -->
    <div class="modal" id="symbolModal">
      <div class="modal-content">
        <div class="modal-title">Change Symbol</div>
        <div class="input-group">
          <label class="input-label">Symbol</label>
          <input
            type="text"
            class="input-field"
            id="symbolInput"
            placeholder="e.g., AAPL, GOOGL, MSFT"
          />
        </div>
        <div class="button-group">
          <button class="btn btn-primary" onclick="changeSymbol()">Load</button>
          <button class="btn btn-secondary" onclick="closeModal()">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script>
  // ==================== CHART INITIALIZATION ====================
  const chart = LightweightCharts.createChart(
    document.getElementById("chart"),
    {
      layout: {
        textColor: "#d1d5db",
        background: { type: "solid", color: "#131722" },
      },
      grid: {
        vertLines: { color: "#1e2229" },
        horzLines: { color: "#1e2229" },
      },
      width: document.getElementById("chart").clientWidth,
      height: document.getElementById("chart").clientHeight,
    }
  );

  // ✅ Correct method
  const candlestickSeries = chart.addCandlestickSeries({
    upColor: "#26a69a",
    downColor: "#ef5350",
    borderVisible: false,
    wickUpColor: "#26a69a",
    wickDownColor: "#ef5350",
  });

  const data = [
    { time: 1642427876, open: 10, high: 10.63, low: 9.49, close: 9.55 },
    { time: 1642514276, open: 9.55, high: 10.3, low: 9.42, close: 9.94 },
    { time: 1642600676, open: 9.94, high: 10.17, low: 9.92, close: 9.78 },
    { time: 1642687076, open: 9.78, high: 10.59, low: 9.18, close: 9.51 },
    { time: 1642773476, open: 9.51, high: 10.46, low: 9.1, close: 10.17 },
    { time: 1642859876, open: 10.17, high: 10.96, low: 10.16, close: 10.47 },
    { time: 1642946276, open: 10.47, high: 11.39, low: 10.4, close: 10.81 },
    { time: 1643032676, open: 10.81, high: 11.6, low: 10.3, close: 10.75 },
    { time: 1643119076, open: 10.75, high: 11.6, low: 10.49, close: 10.93 },
    { time: 1643205476, open: 10.93, high: 11.53, low: 10.76, close: 10.96 },
  ];

  candlestickSeries.setData(data);

  chart.timeScale().fitContent();

  // ✅ Responsive fix
  window.addEventListener("resize", () => {
    chart.applyOptions({
      width: document.getElementById("chart").clientWidth,
      height: document.getElementById("chart").clientHeight,
    });
  });
</script>
  </body>
</html>
